<!DOCTYPE HTML><html><head><meta charset="utf-8"><title>MacOS修改文件时间属性 | 澄澈少年的博客</title><meta name="author" content="澄澈少年"><meta name="description" content="澄澈少年的博客"><meta name="keywords" content="澄澈少年的博客, GOTOJAVA.CN, Developer"><meta id="viewport" name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black"><meta property="og:title" content="MacOS修改文件时间属性"><meta property="og:site_name" content="澄澈少年的博客"><meta property="og:image" content="/favicon.ico"><meta name="360-site-verification" content="c9a8ebf0040e96e9b58a4bb1072e6e43"><link href="/favicon.ico" rel="icon"><link rel="alternate" href="/atom.xml" title="澄澈少年的博客" type="application/atom+xml"><link rel="stylesheet" href="/css/style.css" media="screen" type="text/css"><meta name="generator" content="Hexo 6.3.0"></head><body><div class="blog"><div class="content"><header><meta name="baidu-site-verification" content="codeva-aDOg4qreQ0"><div class="site-branding"><h1 class="site-title"><a href="/">澄澈少年的博客</a></h1><p class="site-description"></p></div><nav class="site-navigation"><ul><li><a href="/">主页</a></li><li><a href="/archives">归档</a></li><li><a href="/tags">标签</a></li><li><a href="/about">关于我</a></li><li><a href="/links">链接</a></li></ul></nav></header><main class="site-main posts-loop"><article><h3 class="article-title"><span>MacOS修改文件时间属性</span></h3><div class="article-top-meta"><span class="posted-on"><a href="/article/43757ee8.html" rel="bookmark"><time class="entry-date published" datetime="2023-10-08T13:50:38.000Z">2023-10-08</time></a></span></div><div class="article-content"><div class="entry"><meta name="referrer" content="no-referrer"><p>记录在MacOS下修改文件的时间属性。</p><span id="more"></span><blockquote><p>修改文件创建时间：</p></blockquote><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">touch</span> -t 201209160330.00 /Users/name/Desktop/somefile.jpg</span><br></pre></td></tr></table></figure><blockquote><p>修改文件修改时间：</p></blockquote><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">touch</span> -mt 201209160330.00 /Users/name/Desktop/somefile.jpg</span><br></pre></td></tr></table></figure><blockquote><p>批量修改文件修改时间：</p></blockquote><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">touch</span> -mt 200801120000 /Volumes/Mac\ HD/Pictures/Album/*</span><br></pre></td></tr></table></figure></div></div><div class="article-footer"><div class="article-meta pull-left"><span class="post-categories"><i class="icon-categories"></i> <a href="/categories/技术分享/">技术分享</a> </span><span class="post-tags"><i class="icon-tags"></i> <a href="/tags/OS/">OS</a></span></div></div></article><section id="comment" class="comment"><div id="vcomments"></div></section><script src="//cdn.jsdelivr.net/npm/leancloud-storage@3.10.0/dist/av-min.js"></script><script src="//unpkg.com/valine/dist/Valine.min.js"></script><script>new Valine({el:"#vcomments",appId:"zYYGWWOlkG48YmpTRU0TmBMw-gzGzoHsz",appKey:"zBPRCCEH47oYdh6fTr8KWNax"})</script></main><footer class="site-footer"><p class="site-info">Copyright &copy; 2023 澄澈少年的博客<br>网站备案：<a href="https://beian.miit.gov.cn/" target="_blank">鄂ICP备18000030号-2</a></p></footer></div></div></body></html>
